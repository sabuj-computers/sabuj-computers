<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>সনদ যাচাই - সবুজ কম্পিউটার ট্রেনিং সেন্টার</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Noto+Serif+Bengali:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    :root { --g1: #0d3d1f; --g2: #1a6b35; --gold: #c8a847; --bg: #f2f8f4; }
    body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    
    header { background: linear-gradient(160deg, var(--g1) 0%, #0f4a20 100%); padding: 20px; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .brand-title { margin:0; font-family: 'Noto Serif Bengali', serif; font-size: 26px; }
    .subtitle { margin:5px 0 0; opacity: 0.9; font-size: 15px; }
    
    .container { max-width: 600px; margin: 40px auto; padding: 20px; width: 100%; box-sizing: border-box; flex: 1; }
    .card { background: #fff; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(13,61,31,0.08); text-align: center; }
    
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { flex: 1; padding: 14px 20px; border: 2px solid #e4ece7; border-radius: 10px; font-family: inherit; font-size: 16px; transition: 0.3s; background: #fafcfb; }
    .search-box input:focus { outline: none; border-color: var(--g2); background: #fff; }
    .search-box button { background: linear-gradient(135deg, var(--g1), var(--g2)); color: white; border: none; padding: 14px 28px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px; transition: 0.3s; }
    .search-box button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26,107,53,0.3); }
    
    .result { display: none; margin-top: 30px; padding: 30px 20px; border-radius: 16px; border: 2px solid transparent; animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .result.success { border-color: #22c55e; background: #f0fdf4; }
    .result.error { border-color: #ef4444; background: #fef2f2; }
    
    .icon-large { font-size: 56px; margin-bottom: 15px; }
    .student-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 15px auto; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    
    .loader { display: none; border: 4px solid #e4ece7; border-top: 4px solid var(--g2); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .back-link { display: inline-block; margin-top: 20px; color: var(--g2); text-decoration: none; font-weight: bold; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1 class="brand-title">সবুজ কম্পিউটার ট্রেনিং সেন্টার</h1>
    <p class="subtitle">অনলাইন সনদ ও আইডি যাচাইকরণ পোর্টাল</p>
  </header>

  <div class="container">
    <div class="card">
      <h2 style="color: var(--g1); margin-top: 0; font-family: 'Noto Serif Bengali', serif;">সনদ যাচাই করুন</h2>
      <p style="color: #6b8c76; margin-bottom: 25px;">শিক্ষার্থীর আইডি (Registration ID) দিয়ে নিচের বক্সে সার্চ করুন অথবা QR কোড স্ক্যান করুন।</p>
      
      <div class="search-box">
        <input type="text" id="certId" placeholder="যেমন: SCTC-APP-2026-1234">
        <button onclick="verifyCert()">যাচাই করুন</button>
      </div>
      
      <div class="loader" id="loader"></div>

      <div id="resultBox" class="result">
        <!-- Dynamic content will be loaded here -->
      </div>
      
      <a href="index.html" class="back-link">← মূল ওয়েবসাইটে ফিরে যান</a>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCTCLqLGCzBt9EpgMpEBWent8fa4M-C0Xk",
      authDomain: "sabuj-computers.firebaseapp.com",
      databaseURL: "https://sabuj-computers-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sabuj-computers",
      storageBucket: "sabuj-computers.firebasestorage.app",
      messagingSenderId: "781121353789",
      appId: "1:781121353789:web:38b0f78af57b66ddf05254"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function verifyCert(id = null) {
      const certId = id || document.getElementById('certId').value.trim();
      if(!certId) {
        alert('অনুগ্রহ করে একটি আইডি প্রদান করুন।');
        return;
      }
      
      document.getElementById('certId').value = certId;
      document.getElementById('loader').style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';

      db.ref('sabuj/applications/' + certId).once('value').then(snap => {
        document.getElementById('loader').style.display = 'none';
        const data = snap.val();
        const resultBox = document.getElementById('resultBox');
        
        // Check if data exists and status is approved/active
        if(data && (data.status === 'approved' || data.status === 'active')) {
          const courseName = data.enrollment?.courseId === 'BTEB' ? 'Computer Office Application (BTEB)' : 'Computer Office Application (Foundation)';
          const imgHtml = data.personal?.photo ? `<img src="${data.personal.photo}" class="student-img">` : '<div class="student-img" style="display:flex;align-items:center;justify-content:center;background:#e4ece7;font-size:40px;color:#a0b5a8;">👤</div>';
          
          resultBox.className = 'result success';
          resultBox.innerHTML = `
            <div class="icon-large">✅</div>
            <h3 style="color: #166534; margin: 0 0 15px 0; font-size: 22px;">সনদটি সঠিক ও ভেরিফাইড!</h3>
            ${imgHtml}
            <h2 style="margin: 15px 0 5px; color: var(--g1); font-size: 24px;">${data.personal?.nameBn || data.personal?.nameEn}</h2>
            <p style="margin: 0; color: #4a6040; font-weight: bold; font-size: 16px;">ID: ${certId}</p>
            <p style="margin: 5px 0 0; color: #6b8c76; font-size: 15px;">কোর্স: ${courseName}</p>
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #bbf7d0;">
              <p style="margin: 0; color: #15803d; font-size: 14px;">এই শিক্ষার্থী সবুজ কম্পিউটার ট্রেনিং সেন্টারের একজন নিবন্ধিত ছাত্র/ছাত্রী।</p>
            </div>
          `;
        } else {
          resultBox.className = 'result error';
          resultBox.innerHTML = `
            <div class="icon-large">❌</div>
            <h3 style="color: #991b1b; margin: 0 0 10px 0; font-size: 22px;">সনদটি খুঁজে পাওয়া যায়নি!</h3>
            <p style="margin: 0; color: #7f1d1d; font-size: 15px;">দয়া করে সঠিক আইডি প্রদান করুন অথবা কর্তৃপক্ষের সাথে যোগাযোগ করুন। হতে পারে আবেদনটি এখনো পেন্ডিং অবস্থায় আছে।</p>
          `;
        }
        resultBox.style.display = 'block';
      }).catch((error) => {
        document.getElementById('loader').style.display = 'none';
        alert('সার্ভার এরর! দয়া করে একটু পর আবার চেষ্টা করুন।');
        console.error(error);
      });
    }

    // Check URL params on load (For QR Code Scanning)
    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const certParam = urlParams.get('cert');
      if(certParam) {
        verifyCert(certParam);
      }
    };
  </script>
</body>
</html>
