<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>সনদ যাচাই - সবুজ কম্পিউটার ট্রেনিং সেন্টার</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dwyxep1kq/image/upload/v1723444833/sctc-logo_m9y81c.png">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Noto+Serif+Bengali:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    :root { --g1: #0d3d1f; --g2: #1a6b35; --g3: #2e9e52; --gold: #c8a847; --bg: #f2f8f4; --muted: #6b8c76; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    
    header { 
      background: linear-gradient(160deg, var(--g1) 0%, #0f4a20 100%); padding: 20px; text-align: center; color: white; 
      box-shadow: 0 4px 24px rgba(0,0,0,0.3); position: relative;
    }
    header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--gold), transparent, var(--gold)); }
    .brand-title { margin:0; font-family: 'Noto Serif Bengali', serif; font-size: 26px; }
    .subtitle { margin:5px 0 0; opacity: 0.9; font-size: 15px; }
    
    .container { max-width: 600px; margin: 40px auto; padding: 20px; width: 100%; box-sizing: border-box; flex: 1; animation: slideUp 0.5s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card { 
      background: #fff; padding: 40px 30px; border-radius: 24px; 
      box-shadow: 0 10px 40px rgba(13,61,31,0.08); text-align: center;
      border: 1px solid rgba(0,0,0,0.04); position: relative; overflow: hidden;
    }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, var(--g2), var(--gold), var(--g2)); }
    
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { 
      flex: 1; padding: 14px 20px; border: 2px solid #e4ece7; border-radius: 14px; 
      font-family: inherit; font-size: 16px; transition: all 0.3s; background: #fafcfb; 
    }
    .search-box input:focus { outline: none; border-color: var(--g2); background: #fff; box-shadow: 0 0 0 4px rgba(46,158,82,0.1); }
    .search-box button { 
      background: linear-gradient(135deg, var(--g1), var(--g2)); color: white; border: none; 
      padding: 14px 28px; border-radius: 14px; cursor: pointer; font-weight: bold; 
      font-family: inherit; font-size: 16px; transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(26,107,53,0.3);
    }
    .search-box button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,107,53,0.4); }
    .search-box button:active { transform: translateY(0); }
    
    .result { display: none; margin-top: 30px; padding: 30px 20px; border-radius: 20px; border: 2px solid transparent; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .result.success { border-color: #22c55e; background: linear-gradient(135deg, #f0fdf4, #dcfce7); }
    .result.error { border-color: #ef4444; background: linear-gradient(135deg, #fef2f2, #fee2e2); }
    
    .icon-large { font-size: 56px; margin-bottom: 15px; }
    .student-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 15px auto; border: 4px solid #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.12); transition: transform 0.3s; }
    .student-img:hover { transform: scale(1.05); }
    
    .loader { display: none; border: 4px solid #e4ece7; border-top: 4px solid var(--g2); border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .back-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; color: var(--g2); text-decoration: none; font-weight: bold; transition: all 0.2s; padding: 8px 16px; border-radius: 10px; }
    .back-link:hover { background: rgba(46,158,82,0.08); color: var(--g1); transform: translateX(-2px); }
    
    /* Footer */
    .verify-footer { background: linear-gradient(135deg, #050e07, var(--g1)); color: rgba(255,255,255,0.6); padding: 20px; text-align: center; font-size: 13px; }
    .verify-footer a { color: var(--gold); text-decoration: none; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(13,61,31,0.3); border-radius: 99px; }
    ::selection { background: var(--g3); color: #fff; }
    
    @media(max-width: 480px) {
      .search-box { flex-direction: column; }
      .card { padding: 30px 20px; }
      .container { margin: 20px auto; }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="brand-title">সবুজ কম্পিউটার ট্রেনিং সেন্টার</h1>
    <p class="subtitle">অনলাইন সনদ ও আইডি যাচাইকরণ পোর্টাল</p>
  </header>

  <div class="container">
    <div class="card">
      <h2 style="color: var(--g1); margin-top: 0; font-family: 'Noto Serif Bengali', serif;">সনদ যাচাই করুন</h2>
      <p style="color: #6b8c76; margin-bottom: 25px;">শিক্ষার্থীর আইডি (Registration ID) দিয়ে নিচের বক্সে সার্চ করুন অথবা QR কোড স্ক্যান করুন।</p>
      
      <div class="search-box">
        <input type="text" id="certId" placeholder="যেমন: SCTC-APP-2026-1234">
        <button onclick="verifyCert()">যাচাই করুন</button>
      </div>
      
      <div class="loader" id="loader"></div>

      <div id="resultBox" class="result">
        <!-- Dynamic content will be loaded here -->
      </div>
      
      <a href="home.html" class="back-link">← মূল ওয়েবসাইটে ফিরে যান</a>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCTCLqLGCzBt9EpgMpEBWent8fa4M-C0Xk",
      authDomain: "sabuj-computers.firebaseapp.com",
      databaseURL: "https://sabuj-computers-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sabuj-computers",
      storageBucket: "sabuj-computers.firebasestorage.app",
      messagingSenderId: "781121353789",
      appId: "1:781121353789:web:38b0f78af57b66ddf05254"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function verifyEmployee(empId) {
      document.getElementById('certId').value = empId;
      document.getElementById('loader').style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';

      db.ref('sabuj/attendance-employees').once('value').then(function(snap) {
        document.getElementById('loader').style.display = 'none';
        var data = snap.val() || {};
        var foundEmp = null;
        for (var k in data) {
          if (data[k].uniqueId === empId) { foundEmp = data[k]; break; }
        }
        var resultBox = document.getElementById('resultBox');
        if (foundEmp) {
          var imgHtml = foundEmp.photo
            ? '<img src="' + foundEmp.photo + '" class="student-img">'
            : '<div class="student-img" style="display:flex;align-items:center;justify-content:center;background:#e4ece7;font-size:40px;color:#a0b5a8;">👔</div>';
          resultBox.className = 'result success';
          resultBox.innerHTML =
            '<div class="icon-large">✅</div>' +
            '<h3 style="color:#166534;margin:0 0 15px 0;font-size:22px;">কর্মী যাচাই সফল!</h3>' +
            '<div style="display:inline-block;background:#fff;color:var(--g1);padding:4px 14px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:8px;border:1px solid #bbf7d0;">👔 প্রতিষ্ঠানের কর্মী</div>' +
            imgHtml +
            '<h2 style="margin:15px 0 5px;color:var(--g1);font-size:24px;">' + (foundEmp.name || '—') + '</h2>' +
            '<p style="margin:0;color:#4a6040;font-weight:bold;font-size:16px;">কর্মী আইডি: ' + foundEmp.uniqueId + '</p>' +
            (foundEmp.designation ? '<p style="margin:5px 0 0;color:#6b8c76;font-size:15px;">পদবী: ' + foundEmp.designation + '</p>' : '') +
            (foundEmp.shift ? '<p style="margin:5px 0 0;color:#6b8c76;font-size:15px;">শিফট: ' + foundEmp.shift + '</p>' : '') +
            '<div style="margin-top:20px;padding-top:15px;border-top:1px dashed #bbf7d0;">' +
            '<p style="margin:0;color:#15803d;font-size:14px;">এই ব্যক্তি সবুজ কম্পিউটার ট্রেনিং সেন্টারের একজন নিবন্ধিত কর্মী।</p>' +
            '</div>';
        } else {
          resultBox.className = 'result error';
          resultBox.innerHTML =
            '<div class="icon-large">❌</div>' +
            '<h3 style="color:#991b1b;margin:0 0 10px 0;font-size:22px;">কর্মী খুঁজে পাওয়া যায়নি!</h3>' +
            '<p style="margin:0;color:#7f1d1d;font-size:15px;">এই কর্মী আইডিটি আমাদের রেকর্ডে নেই। দয়া করে কর্তৃপক্ষের সাথে যোগাযোগ করুন।</p>';
        }
        resultBox.style.display = 'block';
      }).catch(function(error) {
        document.getElementById('loader').style.display = 'none';
        alert('সার্ভার এরর! দয়া করে একটু পর আবার চেষ্টা করুন।');
        console.error(error);
      });
    }

    function verifyCert(id = null) {
      const certId = id || document.getElementById('certId').value.trim();
      if(!certId) {
        alert('অনুগ্রহ করে একটি আইডি বা সনদ নম্বর প্রদান করুন।');
        return;
      }
      
      document.getElementById('certId').value = certId;
      document.getElementById('loader').style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';

      db.ref('sabuj/applications').once('value').then(snap => {
        document.getElementById('loader').style.display = 'none';
        const data = snap.val();
        const resultBox = document.getElementById('resultBox');
        
        let foundApp = null;
        let foundAppId = null;

        if (data) {
          // Check if it's an application ID
          if (data[certId]) {
            foundApp = data[certId];
            foundAppId = certId;
          } else {
            // Search by Certificate Number or Registration Number
            for (const key in data) {
              if ((data[key].certificate && data[key].certificate.sonodNo === certId) || 
                  (data[key].regNo && data[key].regNo === certId)) {
                foundApp = data[key];
                foundAppId = key;
                break;
              }
            }
          }
        }

        // Check if data exists and status is approved/active
        if(foundApp && (foundApp.status === 'approved' || foundApp.status === 'active')) {
          const courseName = foundApp.enrollment?.courseId === 'BTEB' ? 'Computer Office Application (BTEB)' : 'Computer Office Application (Foundation)';
          const imgHtml = foundApp.personal?.photo ? `<img src="${foundApp.personal.photo}" class="student-img">` : '<div class="student-img" style="display:flex;align-items:center;justify-content:center;background:#e4ece7;font-size:40px;color:#a0b5a8;">👤</div>';
          const certNoHtml = foundApp.certificate?.sonodNo ? `<p style="margin: 5px 0 0; color: #6b8c76; font-size: 15px;">সনদ নম্বর: ${foundApp.certificate.sonodNo}</p>` : '';
          
          resultBox.className = 'result success';
          resultBox.innerHTML = `
            <div class="icon-large">✅</div>
            <h3 style="color: #166534; margin: 0 0 15px 0; font-size: 22px;">সনদটি সঠিক ও ভেরিফাইড!</h3>
            ${imgHtml}
            <h2 style="margin: 15px 0 5px; color: var(--g1); font-size: 24px;">${foundApp.personal?.nameBn || foundApp.personal?.nameEn}</h2>
            <p style="margin: 0; color: #4a6040; font-weight: bold; font-size: 16px;">${foundApp.regNo ? 'Registration No: ' + foundApp.regNo : 'Application ID: ' + foundAppId}</p>
            ${certNoHtml}
            <p style="margin: 5px 0 0; color: #6b8c76; font-size: 15px;">কোর্স: ${courseName}</p>
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #bbf7d0;">
              <p style="margin: 0; color: #15803d; font-size: 14px;">এই শিক্ষার্থী সবুজ কম্পিউটার ট্রেনিং সেন্টারের একজন নিবন্ধিত ছাত্র/ছাত্রী।</p>
            </div>
          `;
        } else {
          // Fallback: try employee verification
          db.ref('sabuj/attendance-employees').once('value').then(function(empSnap) {
            var empData = empSnap.val() || {};
            var foundEmp = null;
            for (var k in empData) {
              if (empData[k].uniqueId === certId) { foundEmp = empData[k]; break; }
            }
            if (foundEmp) {
              verifyEmployee(certId);
            } else {
              resultBox.className = 'result error';
              resultBox.innerHTML = `
                <div class="icon-large">❌</div>
                <h3 style="color: #991b1b; margin: 0 0 10px 0; font-size: 22px;">কোনো রেকর্ড পাওয়া যায়নি!</h3>
                <p style="margin: 0; color: #7f1d1d; font-size: 15px;">দয়া করে সঠিক শিক্ষার্থী/কর্মী আইডি বা সনদ নম্বর প্রদান করুন অথবা কর্তৃপক্ষের সাথে যোগাযোগ করুন।</p>
              `;
              resultBox.style.display = 'block';
            }
          });
          return;
        }
        resultBox.style.display = 'block';
      }).catch((error) => {
        document.getElementById('loader').style.display = 'none';
        alert('সার্ভার এরর! দয়া করে একটু পর আবার চেষ্টা করুন।');
        console.error(error);
      });
    }

    // Check URL params on load (For QR Code Scanning)
    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const empParam = urlParams.get('emp');
      const certParam = urlParams.get('cert');
      if(empParam) {
        verifyEmployee(empParam);
      } else if(certParam) {
        verifyCert(certParam);
      }
    };
  </script>

  <footer class="verify-footer">
    <p>© ২০২৬ সবুজ কম্পিউটার ট্রেনিং সেন্টার | <a href="home.html">মূল ওয়েবসাইট</a></p>
  </footer>
</body>
</html>
